      </div>

    <!-- Left Workspace: The active testing field (Cols 1-8) -->

      <!-- Top Exam Quick Bar -->

            <button class="set-btn px-3 py-1 text-xs font-semibold rounded-md transition-all text-slate-600 dark:text-slate-400 hover:text-slate-900" onclick="switchSet('B',this)">B</button>
            <button class="set-btn px-3 py-1 text-xs font-semibold rounded-md transition-all text-slate-600 dark:text-slate-400 hover:text-slate-900" onclick="switchSet('C',this)">C</button>
            <button class="set-btn px-3 py-1 text-xs font-semibold rounded-md transition-all text-slate-600 dark:text-slate-400 hover:text-slate-900" onclick="switchSet('D',this)">D</button>
          </div>
        </div>

        <div class="flex items-center gap-1.5">

  <script>
    // System Theme Auto Detection & Setup
    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {

      document.documentElement.classList.remove('dark');

    }

    function toggleDarkMode() {
      const html = document.documentElement;
      const icon = document.getElementById('theme-icon');
      if (html.classList.contains('dark')) {
        html.classList.remove('dark');
        localStorage.theme = 'light';
        icon.className = 'ti ti-moon text-lg';
      } else {
        html.classList.add('dark');

      const mins = Math.floor((elapsed % 3600000) / 60000).toString().padStart(2, '0');
      const secs = Math.floor((elapsed % 60000) / 1000).toString().padStart(2, '0');

            el.className = baseClass + (isCorrect ? 'bg-emerald-500 text-white' : 'bg-rose-500 text-white');
          } else {
            el.className = baseClass + 'border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800';
          }
        }
      });
    }

    function filterMatrix() {
      const filter = document.getElementById('matrix-filter').value;
      document.querySelectorAll('[id^="dot-"]').forEach((el, i) => {
        const qn = i + 1;
        const ans = answered[qn];
        const isCorrect = ans === gc(qn);

        if (filter === 'all') {
          el.style.display = 'flex';
        } else if (filter === 'correct') {
          el.style.display = (ans && isCorrect) ? 'flex' : 'none';
        } else if (filter === 'wrong') {
          el.style.display = (ans && !isCorrect) ? 'flex' : 'none';
        } else if (filter === 'unanswered') {
          el.style.display = (!ans) ? 'flex' : 'none';
        }
      });
    }

    function goQ(i){
      cur=i;
      render();
      setActiveDot();
    }

    function updateStats(){
      const att=Object.keys(answered).length;
      const pct=att>0?Math.round((score/att)*100):0;
      document.getElementById('s-answered').textContent=att;
      document.getElementById('s-correct').textContent=score;
      document.getElementById('s-wrong').textContent=wrong;
      document.getElementById('s-pct').textContent=pct+'%';
      
      const p=Math.round((att/qs.length)*100);
      document.getElementById('prog-fill').style.width=p+'%';
      document.getElementById('prog-txt').textContent=att+' of '+qs.length+' completed';
      document.getElementById('prog-pct').textContent=p+'%';
    }

    function render(){
      const q=qs[cur];
      if(!q)return;
      const qn=q[0],text=q[1],opts=q[2];
      const ans=answered[qn];
      const correct=gc(qn);
      const ci=LBLS.indexOf(correct);
      setActiveDot();

      const optsHtml=opts.map((o,i)=>{
        const lbl=LBLS[i];
        let cls='group w-full flex items-start gap-4 p-4 rounded-xl border-2 text-left transition-all duration-200 ';
        let numCls='w-7 h-7 rounded-lg border-2 text-xs font-bold flex items-center justify-center transition-all duration-200 ';

        if(ans){
          cls+=' cursor-default ';
          if(lbl===ans && lbl===correct){
            cls+='bg-emerald-50/80 border-emerald-500 text-emerald-950 dark:bg-emerald-950/20 dark:border-emerald-500 dark:text-emerald-100';
            numCls+='bg-emerald-500 border-emerald-500 text-white';
          }
          else if(lbl===ans && lbl!==correct){
            cls+='bg-rose-50/80 border-rose-500 text-rose-950 dark:bg-rose-950/20 dark:border-rose-500 dark:text-rose-100';
            numCls+='bg-rose-500 border-rose-500 text-white';
          }
          else if(lbl===correct){
            cls+='bg-emerald-50/40 border-emerald-400 border-dashed text-emerald-900 dark:bg-emerald-950/10 dark:border-emerald-600 dark:text-emerald-200';
            numCls+='border-emerald-500 text-emerald-600 dark:text-emerald-400';
          }
          else {
            cls+='border-slate-100 bg-white/40 opacity-60 text-slate-400 dark:border-slate-800/40 dark:bg-slate-900/40';
            numCls+='border-slate-200 text-slate-300 dark:border-slate-700 dark:text-slate-600';
          }
        } else {
          cls+='border-slate-200 dark:border-slate-800 bg-white hover:bg-slate-50 dark:bg-slate-900 dark:hover:bg-slate-800/80 hover:border-brand-300 hover:shadow-sm cursor-pointer';
          numCls+='border-slate-200 group-hover:border-brand-400 group-hover:text-brand-600 text-slate-400 dark:border-slate-700 dark:group-hover:text-brand-400';
        }

        return `<button class="${cls}" onclick="choose('${lbl}',${qn})" ${ans?'disabled':''}>
          <span class="${numCls}">${lbl}</span>
          <span class="font-medium text-sm pt-0.5 leading-relaxed">${o}</span>
        </button>`;
      }).join('');

      const revealHtml=ans?`
        <div class="mt-6 flex items-start gap-3 p-4 bg-brand-50/60 dark:bg-brand-950/20 border-l-4 border-brand-500 rounded-r-xl text-sm leading-relaxed text-slate-600 dark:text-slate-300 transition-all">
          <i class="ti ti-info-circle text-brand-600 dark:text-brand-400 text-lg mt-0.5 flex-shrink-0"></i>
          <div>
            <span class="font-bold text-slate-900 dark:text-white block mb-1">Answer Analysis</span>
            The correct option is <strong class="text-brand-700 dark:text-brand-300 font-bold">${correct}</strong>: <span class="italic">${opts[ci]}</span>
          </div>
        </div>`:'';

      document.getElementById('main-area').innerHTML=`
        <div class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200/80 dark:border-slate-800/80 p-6 md:p-8 shadow-xl shadow-slate-100/50 dark:shadow-none transition-all duration-300">
          <div class="flex items-center gap-2 mb-4">
            <span class="inline-flex items-center gap-1.5 px-3 py-1 bg-brand-50 text-brand-700 dark:bg-brand-950/60 dark:text-brand-300 text-xs font-bold rounded-lg uppercase tracking-wider">
              <i class="ti ti-help-circle text-sm"></i> Question ${cur+1} of ${qs.length}
            </span>
            ${ans ? (ans===correct ? 
              '<span class="text-xs font-bold text-emerald-600 dark:text-emerald-400 flex items-center gap-1"><i class="ti ti-circle-check"></i> Correct</span>' : 
              '<span class="text-xs font-bold text-rose-600 dark:text-rose-400 flex items-center gap-1"><i class="ti ti-circle-x"></i> Incorrect</span>') : ''}
          </div>
          <div class="text-slate-800 dark:text-slate-100 text-[15px] font-medium leading-relaxed mb-6" id="q-body-text">${formatQuestionText(text)}</div>
          <div class="space-y-3">${optsHtml}</div>
          ${revealHtml}
        </div>
        
        <!-- Interactive Controls Bar -->
        <div class="mt-4 flex justify-between items-center gap-4 bg-white dark:bg-slate-900 p-4 rounded-xl border border-slate-200/60 dark:border-slate-800/60 shadow-sm">
          <button class="px-4 py-2 border border-slate-200 dark:border-slate-700 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-400 text-xs font-bold flex items-center gap-2 transition-all disabled:opacity-40" onclick="prev()" ${cur===0?'disabled':''}>
            <i class="ti ti-arrow-left"></i> Previous
          </button>
          
          <div class="flex items-center gap-2">
            ${!ans?`<button class="px-4 py-2 border border-dashed border-slate-300 dark:border-slate-700 text-slate-500 hover:text-slate-800 dark:hover:text-slate-200 text-xs font-bold rounded-lg flex items-center gap-1.5 transition-all" onclick="skipQ(${qn})"><i class="ti ti-player-skip-forward"></i> Skip</button>`:''}
          </div>
          
          <button class="px-5 py-2 ${cur===qs.length-1?'bg-emerald-600 hover:bg-emerald-700':'bg-brand-600 hover:bg-brand-700'} text-white text-xs font-bold rounded-lg flex items-center gap-2 transition-all" onclick="next()">
            ${cur===qs.length-1?'Finish & Submit':'Next <i class="ti ti-arrow-right"></i>'}
          </button>
        </div>`;
    }

    function choose(lbl,qn){
      if(answered[qn])return;
      const correct=gc(qn);
      answered[qn]=lbl;
      if(lbl===correct) score++;
      else wrong++;
      updateStats();
      updateDot(qn,lbl===correct?'correct':'wrong');
      render();
    }

    function skipQ(qn){
      cur<qs.length-1?next():goResults();
    }

    function prev(){ if(cur>0){cur--; render(); setActiveDot();}}
    function next(){ if(cur<qs.length-1){cur++; render(); setActiveDot();}else{goResults();}}

    function switchSet(s,el){
      document.querySelectorAll('.set-btn').forEach(b=>{
        b.classList.remove('active', 'bg-white', 'dark:bg-slate-900', 'shadow-sm', 'text-brand-600', 'dark:text-brand-400');
        b.classList.add('text-slate-600', 'dark:text-slate-400', 'hover:text-slate-900');
      });
      el.classList.add('active', 'bg-white', 'dark:bg-slate-900', 'shadow-sm', 'text-brand-600', 'dark:text-brand-400');
      el.classList.remove('text-slate-600', 'dark:text-slate-400', 'hover:text-slate-900');
      loadSet(s);
    }

    function doJump(){
      const n=parseInt(document.getElementById('jmp').value)-1;
      if(n>=0&&n<qs.length){goQ(n);document.getElementById('jmp').value='';}
    }

    function resetQuiz(){
      loadSet(cSet);
    }

    function goResults(){
      const att=Object.keys(answered).length;
      const pct=att>0?Math.round((score/att)*100):0;
      let grade,gcol,gbg,gicon;
      
      // AIBE Pass threshold standard: 45% general, 40% reserved
      if(pct>=45){
        grade='PASS (General Rank)';
        gcol='text-emerald-700 dark:text-emerald-400';
        gbg='bg-emerald-50 dark:bg-emerald-950/20 border-emerald-200 dark:border-emerald-900/30';
        gicon='ti-circle-check';
      } else if (pct>=40) {
        grade='PASS (SC/ST Reserved Category)';
        gcol='text-amber-700 dark:text-amber-400';
        gbg='bg-amber-50 dark:bg-amber-950/20 border-amber-200 dark:border-amber-900/30';
        gicon='ti-circle-check';
      } else {
        grade='Needs Improvement (Fail Threshold)';
        gcol='text-rose-700 dark:text-rose-400';
        gbg='bg-rose-50 dark:bg-rose-950/20 border-rose-200 dark:border-rose-900/30';
        gicon='ti-circle-x';
      }

      document.getElementById('main-area').innerHTML=`
        <div class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200/80 dark:border-slate-800/80 p-8 shadow-xl text-center">
          <div class="w-16 h-16 rounded-full bg-brand-50 dark:bg-brand-950 flex items-center justify-center mx-auto mb-4">
            <i class="ti ti-trophy text-3xl text-brand-600 dark:text-brand-400"></i>
          </div>
          
          <h2 class="text-xl font-bold text-slate-900 dark:text-white mb-1">Performance Summary</h2>
          <p class="text-xs text-slate-400 uppercase tracking-widest mb-6">AIBE Practice Assessment</p>

          <div class="flex flex-col md:flex-row gap-6 justify-center items-center mb-8">
            <div class="p-4 bg-slate-50 dark:bg-slate-850 rounded-xl border border-slate-100 dark:border-slate-800 text-center w-full md:w-36">
              <span class="text-3xl font-bold font-mono text-slate-800 dark:text-slate-100">${score}</span>
              <span class="block text-[11px] text-slate-400 font-semibold uppercase tracking-wider mt-1">Correct</span>
            </div>
            <div class="p-4 bg-slate-50 dark:bg-slate-850 rounded-xl border border-slate-100 dark:border-slate-800 text-center w-full md:w-36">
              <span class="text-3xl font-bold font-mono text-slate-800 dark:text-slate-100">${wrong}</span>
              <span class="block text-[11px] text-slate-400 font-semibold uppercase tracking-wider mt-1">Incorrect</span>
            </div>
            <div class="p-4 bg-slate-50 dark:bg-slate-850 rounded-xl border border-slate-100 dark:border-slate-800 text-center w-full md:w-36">
              <span class="text-3xl font-bold font-mono text-slate-800 dark:text-slate-100">${qs.length - att}</span>
              <span class="block text-[11px] text-slate-400 font-semibold uppercase tracking-wider mt-1">Skipped</span>
            </div>
          </div>

          <div class="border-t border-b border-slate-100 dark:border-slate-800 py-6 my-6">
            <div class="inline-flex items-center gap-2 px-4 py-2 border rounded-xl font-semibold text-sm ${gbg} ${gcol}">
              <i class="ti ${gicon} text-lg"></i>
              <span>${grade} Â· ${pct}% Accuracy</span>
            </div>
            <p class="text-xs text-slate-400 mt-3 max-w-md mx-auto">
              Passing threshold for All India Bar Examination is 45% for General and OBC categories, and 40% for SC, ST, and disabled candidates.
            </p>
          </div>

          <div class="flex gap-4 justify-center">
            <button class="px-5 py-2.5 border border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-850 rounded-xl text-xs font-bold text-slate-700 dark:text-slate-300 flex items-center gap-2 transition-all" onclick="reviewAnswers()">
              <i class="ti ti-eye"></i> Review All Answers
            </button>
            <button class="px-5 py-2.5 bg-brand-600 hover:bg-brand-700 text-white rounded-xl text-xs font-bold flex items-center gap-2 shadow-md transition-all" onclick="resetQuiz()">
              <i class="ti ti-refresh"></i> Take Test Again
            </button>
          </div>
        </div>`;
    }

    function reviewAnswers(){
      cur=0;
      render();
      setActiveDot();
    }

    // Keyboard Shortcuts Support for Premium Usability
    document.addEventListener('keydown', function(e) {
      // Avoid hotkeys if users are typing inside the Jump-To box
      if (document.activeElement.id === 'jmp') return;

      if (e.key === 'ArrowRight') {
        next();
      } else if (e.key === 'ArrowLeft') {
        prev();
      } else if (['1', '2', '3', '4'].includes(e.key)) {
        const optionIndex = parseInt(e.key) - 1;
        const currentQ = qs[cur];
        if (currentQ) {
          const qn = currentQ[0];
          choose(LBLS[optionIndex], qn);
        }
      }
    });

    document.getElementById('jmp').addEventListener('keydown',function(e){if(e.key==='Enter') doJump();});

    // Startup Execution Call
    loadSet('A');
  </script>
</body>
</html>
